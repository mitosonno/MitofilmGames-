<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MitoFilm</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0a0f; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; min-height: 100vh; }
.screen { display: none; flex-direction: column; min-height: 100vh; }
.screen.active { display: flex; }
.header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; background: rgba(10,10,15,0.98); border-bottom: 1px solid #1a1a2e; position: sticky; top: 0; z-index: 10; }
.logo { color: #E2471E; font-size: 18px; font-weight: 800; letter-spacing: 2px; }
.coins-badge { display: flex; align-items: center; gap: 6px; background: rgba(226,71,30,0.15); border: 1px solid rgba(226,71,30,0.3); border-radius: 20px; padding: 6px 14px; }
.coins-badge span { color: #E2471E; font-size: 13px; font-weight: 700; }
.stats { display: flex; gap: 8px; padding: 12px 16px 8px; }
.stat { flex: 1; background: #111118; border-radius: 12px; padding: 10px 8px; text-align: center; }
.stat-val { font-size: 20px; font-weight: 700; color: #E2471E; }
.stat-lbl { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 2px; letter-spacing: 0.5px; }
.dots { display: flex; gap: 5px; justify-content: center; padding: 6px 16px 10px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: #1a1a2e; transition: all 0.3s; }
.dot.ok { background: #E2471E; }
.dot.bad { background: #e74c3c; }
.q-type-badge { margin: 0 16px 10px; display: inline-flex; align-items: center; gap: 6px; background: #111118; border: 1px solid #2a2a3a; border-radius: 10px; padding: 6px 12px; font-size: 12px; color: rgba(255,255,255,0.6); }
.media-card { margin: 0 16px 12px; border-radius: 20px; overflow: hidden; position: relative; background: #111118; }
.media-img { width: 100%; height: 260px; object-fit: cover; object-position: top; display: block; }
.no-img { width: 100%; height: 200px; display: flex; align-items: center; justify-content: center; font-size: 70px; background: #111118; }
.card-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px 16px 14px; background: linear-gradient(transparent, rgba(0,0,0,0.92)); }
.card-question { font-size: 15px; font-weight: 600; color: #fff; line-height: 1.4; }
.card-sub { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 4px; }
.round-badge { position: absolute; top: 12px; right: 12px; background: rgba(226,71,30,0.9); color: #fff; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 10px; }
.options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 16px 12px; }
.opt-btn { background: #111118; border: 1px solid #2a2a3a; border-radius: 14px; color: #fff; font-size: 13px; font-weight: 500; padding: 14px 10px; cursor: pointer; text-align: center; transition: all 0.2s; line-height: 1.3; min-height: 56px; }
.opt-btn:active { transform: scale(0.97); }
.opt-btn.correct { background: rgba(39,174,96,0.2); border-color: #27ae60; color: #2ecc71; }
.opt-btn.wrong { background: rgba(231,76,60,0.2); border-color: #e74c3c; color: #e74c3c; }
.opt-btn.reveal { background: rgba(39,174,96,0.15); border-color: #27ae60; }
.opt-btn:disabled { cursor: not-allowed; }
.result-bar { margin: 0 16px 10px; border-radius: 14px; padding: 12px 16px; text-align: center; font-size: 14px; font-weight: 600; display: none; line-height: 1.5; }
.result-bar.correct { background: rgba(39,174,96,0.15); border: 1px solid #27ae60; color: #2ecc71; display: block; }
.result-bar.wrong { background: rgba(231,76,60,0.15); border: 1px solid #e74c3c; color: #e74c3c; display: block; }
.next-btn { margin: 0 16px 16px; width: calc(100% - 32px); background: #E2471E; border: none; border-radius: 14px; color: #fff; font-size: 15px; font-weight: 700; padding: 15px; cursor: pointer; display: none; }
.loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 16px; }
.loading-icon { font-size: 60px; animation: pulse 1s infinite; }
.loading-text { color: rgba(255,255,255,0.5); font-size: 15px; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.95)} }
.lb-wrap { padding: 16px; flex: 1; overflow-y: auto; }
.lb-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; text-align: center; }
.lb-title span { color: #E2471E; }
.lb-item { display: flex; align-items: center; gap: 12px; background: #111118; border-radius: 14px; padding: 12px 14px; margin-bottom: 8px; border: 1px solid #1a1a2e; }
.lb-item.me { border-color: rgba(226,71,30,0.5); background: rgba(226,71,30,0.08); }
.lb-rank { font-size: 16px; font-weight: 700; width: 28px; text-align: center; }
.lb-avatar { width: 36px; height: 36px; border-radius: 50%; background: rgba(226,71,30,0.25); display: flex; align-items: center; justify-content: center; color: #E2471E; font-size: 13px; font-weight: 700; flex-shrink: 0; }
.lb-name { flex: 1; font-size: 14px; font-weight: 500; }
.lb-coins { color: #E2471E; font-size: 14px; font-weight: 700; }
.lb-empty { text-align: center; color: rgba(255,255,255,0.3); padding: 60px 20px; font-size: 14px; line-height: 1.8; }
.bottom-nav { display: flex; background: #0a0a0f; border-top: 1px solid #1a1a2e; padding: 10px 0 20px; position: sticky; bottom: 0; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 4px 0; }
.nav-icon { font-size: 20px; }
.nav-label { font-size: 10px; color: rgba(255,255,255,0.4); }
.nav-item.active .nav-label { color: #E2471E; }
</style>
</head>
<body>

<div id="loadingScreen" class="loading-screen">
  <div class="loading-icon">🎬</div>
  <div class="loading-text">Sual hazırlanır...</div>
</div>

<div id="gameScreen" class="screen">
  <div class="header">
    <span class="logo">MITOFILM</span>
    <div class="coins-badge">🪙 <span id="coinsVal">0</span></div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-val" id="scoreVal">0</div><div class="stat-lbl">DÜZGÜN</div></div>
    <div class="stat"><div class="stat-val" id="streakVal">0</div><div class="stat-lbl">SERİYA 🔥</div></div>
    <div class="stat"><div class="stat-val" id="totalVal">0</div><div class="stat-lbl">CƏMİ</div></div>
  </div>
  <div class="dots" id="dotsRow"></div>
  <div id="qTypeBadge" class="q-type-badge"></div>
  <div class="media-card" id="mediaCard">
    <img id="mediaImg" class="media-img" src="" style="display:none" />
    <div id="noImg" class="no-img" style="display:none">🎬</div>
    <div class="card-overlay">
      <div class="card-question" id="cardQuestion"></div>
      <div class="card-sub" id="cardSub"></div>
    </div>
    <span class="round-badge" id="roundBadge">Sual 1</span>
  </div>
  <div class="options" id="optionsGrid"></div>
  <div class="result-bar" id="resultBar"></div>
  <button class="next-btn" id="nextBtn" onclick="loadQuestion()">▶ Növbəti sual</button>
  <div style="flex:1"></div>
  <div class="bottom-nav">
    <div class="nav-item active" id="navGame" onclick="showScreen('game')">
      <span class="nav-icon">🎮</span><span class="nav-label">Oyun</span>
    </div>
    <div class="nav-item" id="navLb" onclick="showScreen('leaderboard')">
      <span class="nav-icon">🏆</span><span class="nav-label">Liderboard</span>
    </div>
  </div>
</div>

<div id="lbScreen" class="screen">
  <div class="header">
    <span class="logo">MITOFILM</span>
    <div class="coins-badge">🪙 <span id="coinsVal2">0</span></div>
  </div>
  <div class="lb-wrap">
    <div class="lb-title">🏆 <span>MitoMan</span> Liderboard</div>
    <div id="lbList"></div>
  </div>
  <div class="bottom-nav">
    <div class="nav-item" onclick="showScreen('game')">
      <span class="nav-icon">🎮</span><span class="nav-label">Oyun</span>
    </div>
    <div class="nav-item active" onclick="showScreen('leaderboard')">
      <span class="nav-icon">🏆</span><span class="nav-label">Liderboard</span>
    </div>
  </div>
</div>

<script>
const TMDB = '707ef4b59e038ab276ae6d95d85fcc4f';
const BASE = 'https://api.themoviedb.org/3';
const IMG = 'https://image.tmdb.org/t/p/w500';

const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }
const user = tg?.initDataUnsafe?.user;
const myId = String(user?.id || 'guest_' + Math.random().toString(36).slice(2,8));
const myName = user?.first_name || 'Oyuncu';

const st = {
  coins: +localStorage.getItem('mf_coins') || 0,
  score: +localStorage.getItem('mf_score') || 0,
  streak: 0, total: +localStorage.getItem('mf_total') || 0,
  usedActors: JSON.parse(localStorage.getItem('mf_ua') || '[]'),
  usedMovies: JSON.parse(localStorage.getItem('mf_um') || '[]'),
  history: [], answered: false, current: null
};

function save() {
  localStorage.setItem('mf_coins', st.coins);
  localStorage.setItem('mf_score', st.score);
  localStorage.setItem('mf_total', st.total);
  if (st.usedActors.length > 200) st.usedActors = st.usedActors.slice(-100);
  if (st.usedMovies.length > 200) st.usedMovies = st.usedMovies.slice(-100);
  localStorage.setItem('mf_ua', JSON.stringify(st.usedActors));
  localStorage.setItem('mf_um', JSON.stringify(st.usedMovies));
  const lb = JSON.parse(localStorage.getItem('mf_lb') || '{}');
  lb[myId] = { name: myName, coins: st.coins, score: st.score };
  localStorage.setItem('mf_lb', JSON.stringify(lb));
}

function updateUI() {
  document.getElementById('coinsVal').textContent = st.coins;
  document.getElementById('coinsVal2').textContent = st.coins;
  document.getElementById('scoreVal').textContent = st.score;
  document.getElementById('streakVal').textContent = st.streak;
  document.getElementById('totalVal').textContent = st.total;
  document.getElementById('dotsRow').innerHTML = st.history.slice(-10).map(h => `<div class="dot ${h}"></div>`).join('');
}

function showScreen(name) {
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('gameScreen').className = 'screen' + (name==='game'?' active':'');
  document.getElementById('lbScreen').className = 'screen' + (name==='leaderboard'?' active':'');
  document.getElementById('navGame').className = 'nav-item' + (name==='game'?' active':'');
  document.getElementById('navLb').className = 'nav-item' + (name==='leaderboard'?' active':'');
  if (name === 'leaderboard') renderLB();
}

function renderLB() {
  const lb = JSON.parse(localStorage.getItem('mf_lb') || '{}');
  const list = Object.entries(lb).map(([id,d])=>({id,...d})).sort((a,b)=>b.coins-a.coins).slice(0,20);
  const medals = ['🥇','🥈','🥉'];
  const el = document.getElementById('lbList');
  if (!list.length) { el.innerHTML = '<div class="lb-empty">Hələ heç kim oynamayıb!<br>İlk MitoMan sən ol! 🎬</div>'; return; }
  el.innerHTML = list.map((p,i) => `
    <div class="lb-item ${p.id===myId?'me':''}">
      <span class="lb-rank">${i<3?medals[i]:i+1}</span>
      <div class="lb-avatar">${p.name.slice(0,2).toUpperCase()}</div>
      <span class="lb-name">${p.name}${p.id===myId?' 👈':''}</span>
      <span class="lb-coins">${p.coins} 🪙</span>
    </div>`).join('');
}

async function get(url) {
  const r = await fetch(`${BASE}${url}&api_key=${TMDB}&language=az-AZ`);
  return r.json();
}

async function getActors() {
  const page = Math.floor(Math.random()*20)+1;
  const d = await get(`/person/popular?page=${page}`);
  return (d.results||[]).filter(p=>p.profile_path&&!st.usedActors.includes(p.id));
}

async function getMovies() {
  const page = Math.floor(Math.random()*10)+1;
  const d = await get(`/movie/popular?page=${page}`);
  return (d.results||[]).filter(m=>m.poster_path&&m.release_date&&!st.usedMovies.includes(m.id));
}

async function getTrending() {
  const d = await get(`/trending/movie/week?`);
  return (d.results||[]).filter(m=>m.poster_path&&!st.usedMovies.includes(m.id));
}

function shuffle(arr) { return [...arr].sort(()=>Math.random()-0.5); }

const qTypes = ['actor','movie_year','movie_director','actor_movie','trending'];

async function loadQuestion() {
  st.answered = false;
  document.getElementById('resultBar').className = 'result-bar';
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('optionsGrid').innerHTML = '';
  document.getElementById('mediaImg').style.display = 'none';
  document.getElementById('noImg').style.display = 'none';

  const type = qTypes[Math.floor(Math.random()*qTypes.length)];

  try {
    if (type === 'actor') await qActor();
    else if (type === 'movie_year') await qMovieYear();
    else if (type === 'movie_director') await qDirector();
    else if (type === 'actor_movie') await qActorMovie();
    else await qTrending();
  } catch(e) {
    console.error(e);
    setTimeout(loadQuestion, 1500);
    return;
  }
  showScreen('game');
}

async function qActor() {
  const list = await getActors();
  if (list.length < 4) { st.usedActors=[]; return qActor(); }
  const actor = list[0];
  st.usedActors.push(actor.id);
  const wrong = list.slice(1,4).map(a=>a.name);
  const opts = shuffle([actor.name, ...wrong]);
  const films = (actor.known_for||[]).slice(0,2).map(f=>f.title||f.name).filter(Boolean).join(', ');

  setCard({
    img: IMG+actor.profile_path,
    badge: '🎭 Aktyor',
    question: 'Bu aktyor kimdir?',
    sub: films ? `Tanınmış filmlər: ${films}` : '',
    opts, correct: actor.name
  });
}

async function qMovieYear() {
  const list = await getMovies();
  if (list.length < 4) { st.usedMovies=[]; return qMovieYear(); }
  const movie = list[0];
  st.usedMovies.push(movie.id);
  const year = movie.release_date.slice(0,4);
  const wrongYears = [];
  while(wrongYears.length < 3) {
    const y = String(parseInt(year) + (Math.floor(Math.random()*6)-3));
    if (y !== year && !wrongYears.includes(y)) wrongYears.push(y);
  }
  const opts = shuffle([year, ...wrongYears]);

  setCard({
    img: `https://image.tmdb.org/t/p/w500${movie.poster_path}`,
    badge: '📅 İl',
    question: `"${movie.title}" filmi hansı ildə çıxıb?`,
    sub: '',
    opts, correct: year
  });
}

async function qDirector() {
  const list = await getMovies();
  if (!list.length) { st.usedMovies=[]; return qDirector(); }
  const movie = list[Math.floor(Math.random()*Math.min(list.length,5))];
  st.usedMovies.push(movie.id);

  const credits = await get(`/movie/${movie.id}/credits?`);
  const director = (credits.crew||[]).find(c=>c.job==='Director');
  if (!director) return qDirector();

  const peopleRes = await get(`/person/popular?page=1`);
  const wrongPeople = (peopleRes.results||[]).filter(p=>p.name!==director.name).slice(0,3).map(p=>p.name);
  if (wrongPeople.length < 3) return qDirector();

  const opts = shuffle([director.name, ...wrongPeople]);

  setCard({
    img: `https://image.tmdb.org/t/p/w500${movie.poster_path}`,
    badge: '🎬 Rejissor',
    question: `"${movie.title}" filminin rejissoru kimdir?`,
    sub: movie.release_date ? `${movie.release_date.slice(0,4)} · ${movie.vote_average?.toFixed(1)}⭐` : '',
    opts, correct: director.name
  });
}

async function qActorMovie() {
  const list = await getActors();
  if (!list.length) { st.usedActors=[]; return qActorMovie(); }
  const actor = list[0];
  st.usedActors.push(actor.id);

  const films = (actor.known_for||[]).filter(f=>f.title||f.name);
  if (films.length < 1) return qActorMovie();
  const correct = films[0].title || films[0].name;

  const moviesRes = await getMovies();
  const wrongFilms = moviesRes.filter(m=>m.title!==correct).slice(0,3).map(m=>m.title);
  if (wrongFilms.length < 3) return qActorMovie();

  const opts = shuffle([correct, ...wrongFilms]);

  setCard({
    img: IMG+actor.profile_path,
    badge: '🎭 Film tap',
    question: `Bu aktyor hansı filmdə oynamışdır?`,
    sub: actor.name,
    opts, correct
  });
}

async function qTrending() {
  const list = await getTrending();
  if (list.length < 4) { st.usedMovies=[]; return qTrending(); }
  const movie = list[0];
  st.usedMovies.push(movie.id);
  const wrong = list.slice(1,4).map(m=>m.title||m.name);
  const opts = shuffle([movie.title||movie.name, ...wrong]);

  setCard({
    img: `https://image.tmdb.org/t/p/w500${movie.poster_path}`,
    badge: '🔥 Trend',
    question: 'Bu həftənin trend filmi hansıdır?',
    sub: movie.release_date ? `${movie.release_date.slice(0,4)} · ${movie.vote_average?.toFixed(1)}⭐` : '',
    opts, correct: movie.title||movie.name
  });
}

function setCard({img, badge, question, sub, opts, correct}) {
  st.current = { correct };
  document.getElementById('qTypeBadge').textContent = badge;
  document.getElementById('cardQuestion').textContent = question;
  document.getElementById('cardSub').textContent = sub;
  document.getElementById('roundBadge').textContent = `Sual ${st.total+1}`;

  const imgEl = document.getElementById('mediaImg');
  const noImg = document.getElementById('noImg');
  if (img) {
    imgEl.src = img;
    imgEl.style.display = 'block';
    noImg.style.display = 'none';
    imgEl.onerror = () => { imgEl.style.display='none'; noImg.style.display='flex'; };
  } else {
    imgEl.style.display = 'none';
    noImg.style.display = 'flex';
  }

  document.getElementById('optionsGrid').innerHTML = opts.map(o => `
    <button class="opt-btn" onclick="answer('${o.replace(/'/g,"\\'").replace(/"/g,'&quot;')}', this)">${o}</button>
  `).join('');
}

function answer(chosen, btn) {
  if (st.answered) return;
  st.answered = true;
  st.total++;

  const correct = st.current.correct;
  const isOk = chosen === correct;

  document.querySelectorAll('.opt-btn').forEach(b => {
    b.disabled = true;
    if (b.textContent.trim() === correct) b.classList.add('reveal');
  });

  const result = document.getElementById('resultBar');
  const next = document.getElementById('nextBtn');

  if (isOk) {
    btn.classList.add('correct');
    const bonus = st.streak >= 2 ? Math.min(st.streak*10, 50) : 0;
    st.coins += 100 + bonus;
    st.score++; st.streak++;
    st.history.push('ok');
    result.className = 'result-bar correct';
    result.innerHTML = `✅ Düzgün! +100${bonus>0?` +${bonus} seriya bonusu`:''} 🪙<br><small>Seriya: ${st.streak} 🔥 · Cəmi: ${st.coins} 🪙</small>`;
  } else {
    btn.classList.add('wrong');
    st.coins = Math.max(0, st.coins - 20);
    st.streak = 0;
    st.history.push('bad');
    result.className = 'result-bar wrong';
    result.innerHTML = `❌ Yanlış! -20 🪙<br><small>Düzgün cavab: <b>${correct}</b></small>`;
  }

  next.style.display = 'block';
  updateUI();
  save();
}

updateUI();
loadQuestion();
</script>
</body>
</html>
