<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MitoFilm Oyun</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0f; color: #fff; font-family: -apple-system, sans-serif; min-height: 100vh; }
  .header { display: flex; justify-content: space-between; align-items: center; padding: 16px; background: #0a0a0f; border-bottom: 1px solid #1a1a2e; }
  .logo { color: #E2471E; font-size: 20px; font-weight: 700; letter-spacing: 1px; }
  .coins { background: rgba(226,71,30,0.15); border: 1px solid rgba(226,71,30,0.3); border-radius: 20px; padding: 6px 14px; color: #E2471E; font-size: 13px; font-weight: 600; }
  .stats { display: flex; gap: 8px; padding: 12px 16px; }
  .stat { flex: 1; background: #111118; border-radius: 10px; padding: 10px; text-align: center; }
  .stat-val { font-size: 20px; font-weight: 700; color: #E2471E; }
  .stat-lbl { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 2px; }
  .game-wrap { padding: 12px 16px; }
  .img-card { position: relative; border-radius: 16px; overflow: hidden; background: #111118; margin-bottom: 12px; }
  .img-card img { width: 100%; height: 320px; object-fit: cover; object-position: top; display: block; }
  .img-tag { position: absolute; top: 12px; left: 12px; background: #E2471E; color: #fff; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 8px; }
  .films-hint { background: #111118; border-radius: 12px; padding: 10px 14px; margin-bottom: 12px; font-size: 13px; color: rgba(255,255,255,0.5); }
  .films-hint span { color: #fff; font-weight: 500; }
  .input-area { margin-bottom: 10px; }
  .ans-input { width: 100%; background: #111118; border: 1px solid #2a2a3a; border-radius: 12px; padding: 14px 16px; color: #fff; font-size: 15px; outline: none; }
  .ans-input:focus { border-color: #E2471E; }
  .btn-submit { width: 100%; background: #E2471E; border: none; border-radius: 12px; color: #fff; font-size: 16px; font-weight: 700; padding: 14px; cursor: pointer; margin-bottom: 10px; }
  .btn-row { display: flex; gap: 8px; }
  .btn-hint { flex: 1; background: #111118; border: 1px solid #2a2a3a; border-radius: 12px; color: rgba(255,255,255,0.6); font-size: 13px; padding: 12px; cursor: pointer; }
  .btn-skip { flex: 1; background: #111118; border: 1px solid #2a2a3a; border-radius: 12px; color: rgba(255,255,255,0.6); font-size: 13px; padding: 12px; cursor: pointer; }
  .result { border-radius: 12px; padding: 14px; margin-bottom: 10px; font-size: 14px; font-weight: 600; text-align: center; }
  .result.correct { background: rgba(39,174,96,0.2); border: 1px solid rgba(39,174,96,0.4); color: #2ecc71; }
  .result.wrong { background: rgba(231,76,60,0.2); border: 1px solid rgba(231,76,60,0.4); color: #e74c3c; }
  .btn-next { width: 100%; background: #1a1a2e; border: 1px solid #2a2a3a; border-radius: 12px; color: #fff; font-size: 15px; font-weight: 600; padding: 14px; cursor: pointer; }
  .loading { text-align: center; padding: 80px 20px; }
  .loading div:first-child { font-size: 48px; margin-bottom: 16px; animation: pulse 1s infinite; }
  .loading div:last-child { color: rgba(255,255,255,0.4); font-size: 14px; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .streak-dots { display: flex; gap: 6px; justify-content: center; padding: 8px 16px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #1a1a2e; }
  .dot.ok { background: #E2471E; }
  .dot.bad { background: #e74c3c; }
</style>
</head>
<body>

<div class="header">
  <span class="logo">MITOFILM</span>
  <span class="coins">🪙 <span id="coins">0</span></span>
</div>

<div class="stats">
  <div class="stat"><div class="stat-val" id="score">0</div><div class="stat-lbl">Düzgün</div></div>
  <div class="stat"><div class="stat-val" id="streak">0</div><div class="stat-lbl">Seriya 🔥</div></div>
  <div class="stat"><div class="stat-val" id="total">0</div><div class="stat-lbl">Cəmi</div></div>
</div>

<div class="streak-dots" id="dots"></div>

<div class="game-wrap" id="gameWrap">
  <div class="loading"><div>🎬</div><div>Aktyor yüklənir...</div></div>
</div>

<script>
const TMDB_KEY = '707ef4b59e038ab276ae6d95d85fcc4f';
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const state = {
  coins: 0, score: 0, streak: 0, total: 0,
  usedIds: JSON.parse(localStorage.getItem('mf_used') || '[]'),
  current: null, answered: false, hintsUsed: 0,
  history: []
};

function save() {
  if (state.usedIds.length > 300) state.usedIds = state.usedIds.slice(-150);
  localStorage.setItem('mf_used', JSON.stringify(state.usedIds));
}

function updateUI() {
  document.getElementById('coins').textContent = state.coins;
  document.getElementById('score').textContent = state.score;
  document.getElementById('streak').textContent = state.streak;
  document.getElementById('total').textContent = state.total;
  const dots = document.getElementById('dots');
  dots.innerHTML = state.history.slice(-10).map(h =>
    `<div class="dot ${h}"></div>`
  ).join('');
}

async function loadActor() {
  document.getElementById('gameWrap').innerHTML = `<div class="loading"><div>🎬</div><div>Aktyor axtarılır...</div></div>`;
  try {
    const page = Math.floor(Math.random() * 20) + 1;
    const r = await fetch(`https://api.themoviedb.org/3/person/popular?api_key=${TMDB_KEY}&page=${page}`);
    const data = await r.json();
    const available = (data.results || []).filter(p =>
      p.profile_path && p.known_for?.length > 0 && !state.usedIds.includes(p.id)
    );
    if (!available.length) { state.usedIds = []; save(); return loadActor(); }
    const actor = available[Math.floor(Math.random() * available.length)];
    state.usedIds.push(actor.id);
    save();
    state.current = actor;
    state.answered = false;
    state.hintsUsed = 0;
    renderGame();
  } catch(e) {
    document.getElementById('gameWrap').innerHTML = `<div class="loading"><div>❌</div><div>Xəta! <button onclick="loadActor()" style="color:#E2471E;background:none;border:none;cursor:pointer">Yenidən cəhd et</button></div></div>`;
  }
}

function renderGame() {
  const a = state.current;
  const films = a.known_for.filter(f => f.title||f.name).slice(0,2).map(f=>f.title||f.name);
  const imgUrl = `https://image.tmdb.org/t/p/w500${a.profile_path}`;
  document.getElementById('gameWrap').innerHTML = `
    <div class="img-card">
      <img src="${imgUrl}" onerror="this.style.display='none'" />
      <span class="img-tag">KİM BU AKTYOR?</span>
    </div>
    <div class="films-hint">🎬 Filmlər: <span>${films.join(', ')}</span></div>
    <div class="input-area">
      <input class="ans-input" id="ans" placeholder="Aktyor adını yazın..." />
    </div>
    <button class="btn-submit" onclick="submit()">✅ Cavabla</button>
    <div class="btn-row">
      <button class="btn-hint" onclick="hint()">💡 İpucu (-10🪙)</button>
      <button class="btn-skip" onclick="skip()">⏭ Keç (-5🪙)</button>
    </div>
    <div id="result"></div>
  `;
  document.getElementById('ans').addEventListener('keydown', e => { if(e.key==='Enter') submit(); });
  document.getElementById('ans').focus();
}

function normalize(s) { return s.toLowerCase().replace(/[^\w\s]/g,'').trim(); }

function submit() {
  if (state.answered) return;
  const input = document.getElementById('ans').value.trim();
  if (!input) return;
  state.answered = true;
  state.total++;
  document.getElementById('ans').disabled = true;
  document.querySelector('.btn-submit').disabled = true;

  const correct = state.current.name;
  const a = normalize(input), b = normalize(correct);
  const isOk = a===b || b.includes(a) || b.split(' ').some(p=>p===a) || (a.length>3 && b.includes(a));

  if (isOk) {
    const earned = state.hintsUsed===0 ? 100 : 50;
    const bonus = state.streak>=2 ? Math.min(state.streak*10,50) : 0;
    state.coins += earned+bonus;
    state.score++; state.streak++;
    state.history.push('ok');
    document.getElementById('result').innerHTML = `
      <div class="result correct">✅ Düzgün! +${earned}${bonus>0?` +${bonus} bonus`:''} 🪙<br><small>Cavab: <b>${correct}</b></small></div>
      <button class="btn-next" onclick="loadActor()">▶ Növbəti aktyor</button>`;
  } else {
    state.coins = Math.max(0, state.coins-20);
    state.streak = 0;
    state.history.push('bad');
    document.getElementById('result').innerHTML = `
      <div class="result wrong">❌ Yanlış! -20 🪙<br><small>Düzgün: <b>${correct}</b></small></div>
      <button class="btn-next" onclick="loadActor()">▶ Növbəti aktyor</button>`;
  }
  updateUI();
}

function hint() {
  if (state.answered) return;
  state.hintsUsed++;
  state.coins = Math.max(0,state.coins-10);
  const name = state.current.name;
  const h = name.split(' ').map(p=>p[0]+'•'.repeat(p.length-1)).join(' ');
  document.querySelector('.btn-hint').textContent = `💡 ${h}`;
  document.querySelector('.btn-hint').disabled = true;
  updateUI();
}

function skip() {
  state.coins = Math.max(0,state.coins-5);
  state.streak = 0; state.total++;
  state.history.push('bad');
  updateUI();
  loadActor();
}

updateUI();
loadActor();
</script>
</body>
</html>
